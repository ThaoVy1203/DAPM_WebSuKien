<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển đổi vai trò - Test Phân quyền</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            color: #1A1A1A;
            margin-bottom: 12px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .role-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .role-card {
            background: linear-gradient(135deg, #F3F4F6 0%, #E5E7EB 100%);
            border: 3px solid transparent;
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .role-card.active {
            background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
            border-color: #3B82F6;
        }

        .role-card.leader.active {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-color: #F59E0B;
        }

        .role-icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
        }

        .role-card.leader .role-icon {
            color: #F59E0B;
        }

        .role-card.member .role-icon {
            color: #3B82F6;
        }

        .role-title {
            font-size: 18px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .role-description {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.5;
        }

        .permissions-list {
            background: #F9FAFB;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .permissions-title {
            font-size: 14px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .permission-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            font-size: 13px;
            color: #4B5563;
        }

        .permission-item i {
            color: #10B981;
            font-size: 12px;
        }

        .permission-item.disabled i {
            color: #EF4444;
        }

        .btn-container {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #6B7280;
            border: 2px solid #E5E7EB;
        }

        .btn-secondary:hover {
            border-color: #3B82F6;
            color: #3B82F6;
        }

        .current-role {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
            border-left: 4px solid #10B981;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-role i {
            font-size: 24px;
            color: #10B981;
        }

        .current-role-text {
            flex: 1;
        }

        .current-role-label {
            font-size: 12px;
            color: #059669;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .current-role-value {
            font-size: 16px;
            color: #1A1A1A;
            font-weight: 700;
        }

        @media (max-width: 640px) {
            .role-cards {
                grid-template-columns: 1fr;
            }

            .btn-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-user-shield"></i> Chuyển đổi Vai trò</h1>
        <p class="subtitle">Chọn vai trò để test hệ thống phân quyền Ban Tổ chức</p>

        <div class="current-role" id="currentRoleDisplay">
            <i class="fas fa-info-circle"></i>
            <div class="current-role-text">
                <div class="current-role-label">Vai trò hiện tại</div>
                <div class="current-role-value">Chưa chọn</div>
            </div>
        </div>

        <div class="role-cards">
            <div class="role-card leader" onclick="selectRole('truong_btc')">
                <div class="role-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="role-title">Trưởng Ban Tổ chức</div>
                <div class="role-description">Toàn quyền quản lý tất cả chức năng</div>
            </div>

            <div class="role-card member" onclick="selectRole('thanh_vien_btc')">
                <div class="role-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="role-title">Thành viên BTC</div>
                <div class="role-description">Xem sự kiện, cập nhật trạng thái công việc được giao</div>
            </div>
        </div>

        <div class="permissions-list" id="permissionsList">
            <div class="permissions-title">
                <i class="fas fa-key"></i>
                Quyền truy cập
            </div>
            <div id="permissionsContent">
                <p style="color: #9CA3AF; font-size: 13px; text-align: center; padding: 20px 0;">
                    Chọn vai trò để xem quyền truy cập
                </p>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-secondary" onclick="clearRole()">
                <i class="fas fa-times"></i>
                Xóa vai trò
            </button>
            <button class="btn btn-primary" onclick="goToDashboard()">
                <i class="fas fa-arrow-right"></i>
                Vào Dashboard
            </button>
        </div>
    </div>

    <script>
        let selectedRole = null;

        // Load current role on page load
        window.addEventListener('DOMContentLoaded', function() {
            const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}');
            if (userInfo.role) {
                selectedRole = userInfo.role;
                updateUI();
            }
        });

        function selectRole(role) {
            selectedRole = role;
            updateUI();
        }

        function updateUI() {
            // Update role cards
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('active');
            });

            if (selectedRole === 'truong_btc') {
                document.querySelector('.role-card.leader').classList.add('active');
            } else if (selectedRole === 'thanh_vien_btc') {
                document.querySelector('.role-card.member').classList.add('active');
            }

            // Update current role display
            const currentRoleValue = document.querySelector('.current-role-value');
            if (selectedRole === 'truong_btc') {
                currentRoleValue.textContent = 'Trưởng Ban Tổ chức';
            } else if (selectedRole === 'thanh_vien_btc') {
                currentRoleValue.textContent = 'Thành viên Ban Tổ chức';
            } else {
                currentRoleValue.textContent = 'Chưa chọn';
            }

            // Update permissions list
            updatePermissionsList();

            // Save to localStorage
            if (selectedRole) {
                const userInfo = {
                    role: selectedRole,
                    name: selectedRole === 'truong_btc' ? 'Nguyễn Văn A' : 'Trần Thị B'
                };
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
            }
        }

        function updatePermissionsList() {
            const permissionsContent = document.getElementById('permissionsContent');

            if (!selectedRole) {
                permissionsContent.innerHTML = `
                    <p style="color: #9CA3AF; font-size: 13px; text-align: center; padding: 20px 0;">
                        Chọn vai trò để xem quyền truy cập
                    </p>
                `;
                return;
            }

            const leaderPermissions = [
                { text: 'Dashboard - Xem tất cả', allowed: true },
                { text: 'Sự kiện của tôi - Quản lý toàn bộ', allowed: true },
                { text: 'Ngân sách - Tạo, sửa, xóa', allowed: true },
                { text: 'Phê duyệt - Duyệt yêu cầu', allowed: true },
                { text: 'Công việc (Task) - Quản lý tất cả', allowed: true },
                { text: 'Người tham gia - Quản lý', allowed: true },
                { text: 'Báo cáo - Tạo và xuất', allowed: true }
            ];

            const memberPermissions = [
                { text: 'Dashboard - Chỉ xem sự kiện được phân công', allowed: true },
                { text: 'Sự kiện của tôi - Xem danh sách và chi tiết (không tạo/sửa/xóa)', allowed: true },
                { text: 'Ngân sách - Không truy cập', allowed: false },
                { text: 'Phê duyệt - Không truy cập', allowed: false },
                { text: 'Công việc (Task) - Xem và cập nhật trạng thái task của mình', allowed: true },
                { text: 'Người tham gia - Không truy cập', allowed: false },
                { text: 'Báo cáo - Không truy cập', allowed: false }
            ];

            const permissions = selectedRole === 'truong_btc' ? leaderPermissions : memberPermissions;

            permissionsContent.innerHTML = permissions.map(perm => `
                <div class="permission-item ${!perm.allowed ? 'disabled' : ''}">
                    <i class="fas ${perm.allowed ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                    <span>${perm.text}</span>
                </div>
            `).join('');
        }

        function clearRole() {
            selectedRole = null;
            localStorage.removeItem('userInfo');
            updateUI();
        }

        function goToDashboard() {
            if (!selectedRole) {
                alert('Vui lòng chọn vai trò trước khi tiếp tục');
                return;
            }
            window.location.href = 'btc-dashboard.html';
        }
    </script>
</body>
</html>
